spring.main.web-application-type=none
spring.main.banner-mode=off

# Mode: generate-codes | generate-pdf | (blank = interactive shell)
app.mode=

# Code generation properties
app.event-code=
app.code-count=17

# CSV / PDF path properties
app.csv-input-path=codes.csv
app.csv-output-path=codes.csv
app.output-path=qr-codes.pdf
app.qr-size=200
app.grid-columns=3
app.grid-rows=4
app.show-cutting-lines=false
app.event-name=

# URL properties
# base-url: printed on the back of the PDF (e.g. https://my.site)
app.base-url=https://my.site
# gallery-url: full URL used in the QR code (must start with https://, e.g. https://my.site/gallery?code=)
app.gallery-url=https://my.site/gallery?code=

# Back page logo (supports JPEG, PNG, and WebP; leave blank to omit logo)
app.logo-url=

# PDF label properties (text shown on QR code cards; defaults to German)
app.gallery-code-label=GALERIE CODE
app.gallery-password-label=GALERIE PASSWORT

# PicPeak integration — set app.picpeak.enabled=true to create gallery events via API
# Credentials and instance URL are provided via picpeak.properties (see picpeak.properties.example).
# All other defaults come from the PicPeakProperties constructor; only booleans that
# default to true (but Java defaults to false) are listed here.
app.picpeak.enabled=false
app.picpeak.require-password=true
app.picpeak.feedback-enabled=true
app.picpeak.allow-ratings=true
app.picpeak.allow-favorites=true
app.picpeak.moderate-comments=true
app.picpeak.show-feedback-to-guests=false
app.picpeak.header-style=minimal
app.picpeak.hero-divider-style=wave
app.picpeak.css-template-id=2
