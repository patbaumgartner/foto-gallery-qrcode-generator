spring.main.web-application-type=none
spring.main.banner-mode=off

# Mode: generate-codes | generate-pdf | (blank = interactive shell)
app.mode=

# Code generation properties
app.event-code=
app.code-count=50

# CSV / PDF path properties
app.csv-input-path=codes.csv
app.csv-output-path=codes.csv
app.output-path=qr-codes.pdf
app.qr-size=200
app.grid-columns=3
app.grid-rows=4
app.show-cutting-lines=false
app.event-name=

# URL properties
# base-url: printed on the back of the PDF (e.g. https://my.site)
app.base-url=https://my.site
# gallery-url: full URL used in the QR code (must start with https://, e.g. https://my.site/gallery?code=)
app.gallery-url=https://my.site/gallery?code=

# Back page logo (supports JPEG, PNG, and WebP; leave blank to omit logo)
app.logo-url=
