name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Assemble release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="foto-gallery-qrcode-generator-${VERSION}.zip"

          # Collect files into a staging directory
          mkdir -p staging
          cp target/foto-gallery-qrcode-generator-*.jar staging/
          cp generate-qrcodes.sh staging/
          cp generate-qrcodes.bat staging/
          cp -r src staging/
          cp pom.xml staging/
          cp mvnw staging/
          cp mvnw.cmd staging/
          cp -r .mvn staging/
          [ -f README.md ] && cp README.md staging/

          zip -r "${ARCHIVE}" staging/
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
