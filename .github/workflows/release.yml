name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            script: generate-qrcodes.sh
            binary: foto-gallery-qrcode-generator
          - os: windows-latest
            platform: windows
            script: generate-qrcodes.bat
            binary: foto-gallery-qrcode-generator.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: maven

      - name: Build native image
        shell: bash
        run: ./mvnw package -Pnative -DskipTests

      - name: Assemble release archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="foto-gallery-qrcode-generator-${VERSION}-${{ matrix.platform }}.zip"

          mkdir -p staging
          cp "target/${{ matrix.binary }}" staging/
          cp "${{ matrix.script }}" staging/

          cd staging
          7z a -tzip "../${ARCHIVE}" .
          cd ..

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
